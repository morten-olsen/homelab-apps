name: Release Common Chart

on:
  push:
    branches:
      - main
    paths:
      - "apps/common/**"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          mkdir -p packages
          helm package apps/common -d packages

      - name: Update index
        run: |
          if [ -f gh-pages/index.yaml ]; then
            helm repo index packages --url https://morten-olsen.github.io/homelab-apps --merge gh-pages/index.yaml
          else
            helm repo index packages --url https://morten-olsen.github.io/homelab-apps
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages
          keep_files: true
