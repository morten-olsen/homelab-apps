image:
  repository: ghcr.io/motis-project/motis
  # Renovate will pin the SHA on first sync. MOTIS doesn't tag releases — `master`
  # is the rolling tag.
  tag: master@sha256:f3d8901e7d2bada43214e3235b42be725ef74c0fd6b16393f0a65d9249ce0f91
  pullPolicy: IfNotPresent

subdomain: motis

# DNS is auto-generated by Kyverno from the private-gateway VirtualService.

# Single-replica, Recreate so the weekly rollout restart cleanly hands the
# PVC from old pod to new pod without two motis processes touching /data.
deployment:
  strategy: Recreate
  replicas: 1
  revisionHistoryLimit: 0

container:
  port: 8080
  # TCP probe — MOTIS serves HTTP on 8080 but we don't yet know if it 301s plain
  # HTTP under the Istio mTLS path (cf. dawarich). TCP is safe.
  healthProbe:
    type: tcpSocket
    port: http

# Override the image's default `/motis server /data`. `motis import` writes its
# preprocessed artifacts into a `data/` subdir of its working directory, so we
# end up with /data/data/tt.bin etc. — point the server at that subdir explicitly
# (positional args appear to be ignored; only -d/--data is parsed).
command:
  - /motis
  - server
  - -d
  - /data/data

service:
  port: 80
  type: ClusterIP

# One PVC, no backup — everything in /data is reproducible by re-running the
# init pipeline against upstream OSM + GTFS.
volumes:
  - name: data
    mountPath: /data
    persistentVolumeClaim: data

persistentVolumeClaims:
  - name: data
    size: 20Gi
    storageClassName: local-path
    backup: false

# Two init containers handle the smart-refresh: data-fetcher pulls OSM + GTFS,
# data-importer runs `motis config` + `motis import`. The fetcher no-ops when
# the `.last-import` marker is fresh; the importer additionally re-runs when
# the motis binary itself changed (its preprocessed data format is binary-
# version-specific — running on a binary with a different `nigiri_bin_ver`
# crashes the server with `binary version mismatch`).
#
# The weekly cron (templates/refresh-cronjob.yaml) just kicks `kubectl rollout
# restart` — staleness check + refresh logic lives here so any pod restart
# self-heals.
initContainers:
  - name: data-fetcher
    image: curlimages/curl:8.21.0@sha256:7c12af72ceb38b7432ab85e1a265cff6ae58e06f95539d539b654f2cfa64bb13
    securityContext:
      # local-path PVC starts root-owned; init containers run as root to write
      # without fighting UIDs. Server container runs as the image's `motis` user.
      runAsUser: 0
    command: ["/bin/sh", "-c"]
    args:
      - |
        set -eu
        INTERVAL=604800  # 7 days
        if [ -f /data/.last-import ]; then
          AGE=$(($(date +%s) - $(stat -c %Y /data/.last-import)))
          if [ "$AGE" -lt "$INTERVAL" ]; then
            echo "data is $((AGE / 86400))d old (<7d), skipping fetch"
            exit 0
          fi
          echo "data is $((AGE / 86400))d old, refreshing"
        else
          echo "no marker, initial seed"
        fi
        echo "fetching denmark OSM extract..."
        curl -fL --retry 3 -o /data/osm.pbf.new \
          https://download.geofabrik.de/europe/denmark-latest.osm.pbf
        mv /data/osm.pbf.new /data/osm.pbf
        echo "fetching Rejseplanen GTFS..."
        curl -fL --retry 3 -o /data/gtfs.zip.new \
          https://www.rejseplanen.info/labs/GTFS.zip
        mv /data/gtfs.zip.new /data/gtfs.zip
        echo "fetch complete"
    volumeMounts:
      - name: data
        mountPath: /data
  - name: data-importer
    image: ghcr.io/motis-project/motis:master@sha256:f3d8901e7d2bada43214e3235b42be725ef74c0fd6b16393f0a65d9249ce0f91
    securityContext:
      runAsUser: 0
    command: ["/bin/sh", "-c"]
    args:
      - |
        set -eu
        INTERVAL=604800
        # Hash the motis binary about to run the import. If it differs from the
        # hash stored alongside the imported data, the on-disk preprocessed
        # artifacts may be in an incompatible format — force re-import regardless
        # of the 7-day marker. OSM/GTFS inputs from a previous fetch are reused.
        BIN_HASH=$(sha256sum /motis | cut -d' ' -f1)
        STORED_HASH=$(cat /data/.motis-binary-hash 2>/dev/null || echo "")
        REASON=""
        if [ "$BIN_HASH" != "$STORED_HASH" ]; then
          REASON="motis binary changed (was=${STORED_HASH:-none}, now=$BIN_HASH)"
        elif [ ! -f /data/.last-import ]; then
          REASON="no .last-import marker"
        else
          AGE=$(($(date +%s) - $(stat -c %Y /data/.last-import)))
          if [ "$AGE" -ge "$INTERVAL" ]; then
            REASON="data is $((AGE / 86400))d old (>=7d)"
          fi
        fi
        if [ -z "$REASON" ]; then
          echo "data is fresh and binary unchanged, skipping import"
          exit 0
        fi
        echo "re-importing: $REASON"
        # Wipe previous import output so a binary-format change can't leave
        # stale artifacts behind. Raw OSM/GTFS in /data/* survive.
        rm -rf /data/data
        # Skip `motis config` — its default tile profile is a relative path
        # that doesn't resolve here, and its 256 GiB db_size cap is overkill.
        # Hand-write a config with an absolute path to the bundled tile profile
        # and an 8 GiB db_size cap (LMDB is sparse — actual DK tile data is
        # well under that). num_days: 30 — we re-import weekly, so a month of
        # forward planning is plenty.
        cat > /data/config.yml <<'EOF'
        osm: osm.pbf
        tiles:
          profile: /tiles-profiles/full.lua
          db_size: 8589934592
          flush_threshold: 100000
        timetable:
          first_day: TODAY
          num_days: 30
          datasets:
            gtfs:
              path: gtfs.zip
        street_routing: true
        geocoding: true
        reverse_geocoding: true
        EOF
        cd /data
        echo "running motis import..."
        /motis import
        echo "$BIN_HASH" > /data/.motis-binary-hash
        # Import ran as root; the server runs as the image's `motis` user
        # (uid 100 / gid 101) and needs RW access to the tile LMDB at runtime.
        echo "chowning /data to motis user..."
        chown -R 100:101 /data
        touch /data/.last-import
        chown 100:101 /data/.last-import
        echo "import complete"
    volumeMounts:
      - name: data
        mountPath: /data

# Private gateway only — MOTIS has no auth, VPN is the boundary.
virtualService:
  enabled: true
  gateways:
    public: false
    private: true

# No DB, no OIDC, no shared secrets. Single self-contained app.
# TZ is auto-injected by homelab-common from globals.timezone.
