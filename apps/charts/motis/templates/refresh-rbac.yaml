apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{{ .Release.Name }}-refresh"
  namespace: "{{ .Release.Namespace }}"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: "{{ .Release.Name }}-refresh"
  namespace: "{{ .Release.Namespace }}"
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["{{ .Release.Name }}"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "{{ .Release.Name }}-refresh"
  namespace: "{{ .Release.Namespace }}"
subjects:
  - kind: ServiceAccount
    name: "{{ .Release.Name }}-refresh"
    namespace: "{{ .Release.Namespace }}"
roleRef:
  kind: Role
  name: "{{ .Release.Name }}-refresh"
  apiGroup: rbac.authorization.k8s.io
