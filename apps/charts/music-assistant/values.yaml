image:
  repository: ghcr.io/music-assistant/server
  tag: 2.9.2@sha256:5278740e2ea119a72c6819b36ccfdab7df160d7a3a886dad0b58c3980e153012
  pullPolicy: IfNotPresent

subdomain: music-assistant

# DNS configuration
dns:
  enabled: true
  type: A
  dnsClassRef:
    name: private-dns

deployment:
  strategy: Recreate
  replicas: 1
  revisionHistoryLimit: 0
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet

container:
  port: 8095
  healthProbe:
    type: tcpSocket
  securityContext:
    capabilities:
      add:
        - SYS_ADMIN
        - DAC_READ_SEARCH

service:
  port: 80

volumes:
  - name: data
    mountPath: /data
    persistentVolumeClaim: data

persistentVolumeClaims:
  - name: data
    size: 1Gi
    storageClassName: local-path
    backup: true

virtualService:
  enabled: true
  gateways:
    public: false
    private: true
