image:
  repository: ghcr.io/music-assistant/server
  tag: 2.8.3@sha256:b25d12126259c9dfb643236a3b5361b7b63fd9dbb0370a5b607a4dfaf316a909
  pullPolicy: IfNotPresent

subdomain: music-assistant

# DNS configuration
dns:
  enabled: true
  type: A
  dnsClassRef:
    name: private-dns

deployment:
  strategy: Recreate
  replicas: 1
  revisionHistoryLimit: 0
  hostNetwork: true

container:
  port: 8095
  healthProbe:
    type: tcpSocket
  securityContext:
    capabilities:
      add:
        - SYS_ADMIN
        - DAC_READ_SEARCH

service:
  port: 80

volumes:
  - name: data
    mountPath: /data
    persistentVolumeClaim: data

persistentVolumeClaims:
  - name: data
    size: 1Gi
    storageClassName: local-path
    backup: true

virtualService:
  enabled: true
  gateways:
    public: false
    private: true
