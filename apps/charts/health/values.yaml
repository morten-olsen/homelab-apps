image:
  repository: code.olsen.cloud/incubator/health
  tag: latest@sha256:e338039b8ac634f2923047e9318811e53ffccad8d3ee6f522376d3ef55bcfc09
  pullPolicy: IfNotPresent

subdomain: health

# DNS configuration
dns:
  enabled: true
  type: A
  dnsClassRef:
    name: private-dns

# Deployment configuration
deployment:
  strategy: Recreate
  replicas: 1
  revisionHistoryLimit: 0

# Container configuration
container:
  port: 3000
  healthProbe:
    type: httpGet
    path: /api/health

# Service configuration
service:
  port: 80
  type: ClusterIP

probe:
  path: /api/health

# VirtualService configuration (private-only — personal health data)
virtualService:
  enabled: true
  gateways:
    public: false
    private: true

# Database configuration (CNPG provisions `{release}-connection` secret)
database:
  enabled: true

# Generate admin password + JWT signing secret
externalSecrets:
  - name: "{release}-secrets"
    passwords:
      - name: admin-password
        length: 32
        encoding: hex
        allowRepeat: true
        secretKeys:
          - admin-password
      - name: jwt-secret
        length: 48
        encoding: hex
        allowRepeat: true
        secretKeys:
          - jwt-secret

# Environment variables
env:
  HEALTH_DB_DIALECT: postgres
  HEALTH_DB_URL:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: url
  ADMIN_USERNAME: morten
  ADMIN_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: "{release}-secrets"
        key: admin-password
  JWT_SECRET:
    valueFrom:
      secretKeyRef:
        name: "{release}-secrets"
        key: jwt-secret
