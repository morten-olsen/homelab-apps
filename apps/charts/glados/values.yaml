image:
  repository: ghcr.io/morten-olsen/aperture
  tag: 0.29.10
  pullPolicy: Always

subdomain: glados

deployment:
  strategy: Recreate
  replicas: 1

container:
  ports:
    - name: http
      port: 3000
      protocol: TCP
# Service configuration
service:
  port: 3000
  type: ClusterIP

initContainers:
  - name: fix-permissions
    image: busybox@sha256:b3255e7dfbcd10cb367af0d409747d511aeb66dfac98cf30e97e87e4207dd76f
    command: ["sh", "-c", "chown -R 1000:1000 /data"]
    volumeMounts:
      - name: data
        mountPath: /data
    securityContext:
      runAsUser: 0

env:
  OPENAI_BASE_URL: "https://openrouter.ai/api/v1"
  OPENAI_MODEL: "google/gemini-3-flash-preview"
  OPENAI_API_KEY:
    valueFrom:
      secretKeyRef:
        name: glados-secrets
        key: OPENAI_API_KEY

volumes:
  - name: data
    mountPath: /data
    persistentVolumeClaim: data

persistentVolumeClaims:
  - name: data
    size: 10Gi

# VirtualService configuration
virtualService:
  enabled: true
  gateways:
    public: false
    private: true
