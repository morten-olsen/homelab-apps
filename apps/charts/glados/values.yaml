image:
  repository: ghcr.io/morten-olsen/aperture
  tag: 0.29.11@sha256:ab232a881ad9f6f43459302bf702dc8884b5e72c2f3d4757f0cf7e9fae8a6b16
  pullPolicy: Always

subdomain: glados

deployment:
  strategy: Recreate
  replicas: 1

container:
  ports:
    - name: http
      port: 3000
      protocol: TCP
# Service configuration
service:
  port: 3000
  type: ClusterIP

initContainers:
  - name: fix-permissions
    image: busybox@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    command: ["sh", "-c", "chown -R 1000:1000 /data"]
    volumeMounts:
      - name: data
        mountPath: /data
    securityContext:
      runAsUser: 0

env:
  OPENAI_BASE_URL: "https://openrouter.ai/api/v1"
  OPENAI_MODEL: "google/gemini-3-flash-preview"
  OPENAI_API_KEY:
    valueFrom:
      secretKeyRef:
        name: glados-secrets
        key: OPENAI_API_KEY

volumes:
  - name: data
    mountPath: /data
    persistentVolumeClaim: data

persistentVolumeClaims:
  - name: data
    size: 10Gi
    storageClassName: local-path
    backup: true

# VirtualService configuration
probe:
  enabled: false

virtualService:
  enabled: true
  gateways:
    public: false
    private: true
