{{/*
Bootstraps the admin account on first install / after upgrade. Idempotent:
re-runs no-op once the user exists. Mounts the same SQLite PVC as the
server. Waits for migrations to complete (signaled by the SQLite file
existing) before invoking the admin CLI.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-admin-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: gotosocial
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gotosocial
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: admin-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          command:
            - /bin/sh
            - -c
            - |
              set -u
              CFG=/etc/gotosocial/config.yaml
              DB=/gotosocial/storage/sqlite.db

              echo "Waiting for the GoToSocial server to initialize the database..."
              for i in $(seq 1 60); do
                if [ -f "$DB" ]; then
                  echo "DB found after ${i} attempts."
                  break
                fi
                sleep 5
              done
              if [ ! -f "$DB" ]; then
                echo "ERROR: DB file did not appear within 5 minutes." >&2
                exit 1
              fi

              # Give migrations a moment to settle.
              sleep 10

              echo "Creating admin account 'morten' (no-op if it exists)..."
              /gotosocial/gotosocial --config-path "$CFG" admin account create \
                --username morten \
                --email morten@olsen.pro \
                --password "$ADMIN_PASSWORD" || echo "create returned non-zero (likely already exists)"

              echo "Confirming account 'morten'..."
              /gotosocial/gotosocial --config-path "$CFG" admin account confirm \
                --username morten || echo "confirm returned non-zero (likely already confirmed)"

              echo "Promoting account 'morten' to admin..."
              /gotosocial/gotosocial --config-path "$CFG" admin account promote \
                --username morten || echo "promote returned non-zero (likely already admin)"

              echo "Bootstrap complete."
          env:
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-admin
                  key: password
          volumeMounts:
            - name: data
              mountPath: /gotosocial/storage
            - name: config
              mountPath: /etc/gotosocial/config.yaml
              subPath: config.yaml
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
