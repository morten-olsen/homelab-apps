image:
  repository: docker.io/wger/server
  tag: latest
  pullPolicy: IfNotPresent

nginx:
  image:
    repository: docker.io/nginx
    tag: stable
    pullPolicy: IfNotPresent

redis:
  image:
    repository: docker.io/redis
    tag: 7-alpine
    pullPolicy: IfNotPresent

subdomain: wger

# Database configuration
database:
  enabled: true

# Persistent volume claims
persistentVolumeClaims:
  - name: media
    size: 10Gi
    storageClassName: local-path
  - name: redis-data
    size: 1Gi
    storageClassName: local-path
  - name: celery-beat
    size: 1Gi
    storageClassName: local-path

# VirtualService configuration
virtualService:
  enabled: true
  gateways:
    public: true
    private: true
  servicePort: 80

# External Secrets configuration
externalSecrets:
  - name: "{release}-secrets"
    passwords:
      - name: secret-key
        length: 64
        allowRepeat: true
        encoding: hex
        secretKeys:
          - secretKey
      - name: signing-key
        length: 64
        allowRepeat: true
        encoding: hex
        secretKeys:
          - signingKey

# Environment variables shared by web, celery worker, and celery beat
env:
  SECRET_KEY:
    valueFrom:
      secretKeyRef:
        name: "{release}-secrets"
        key: secretKey
  SIGNING_KEY:
    valueFrom:
      secretKeyRef:
        name: "{release}-secrets"
        key: signingKey
  TIME_ZONE:
    value: "{timezone}"
  TZ:
    value: "{timezone}"
  SITE_URL:
    value: "https://{subdomain}.{domain}"
  DJANGO_DB_ENGINE: django.db.backends.postgresql
  DJANGO_DB_DATABASE:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: database
  DJANGO_DB_USER:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: user
  DJANGO_DB_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: password
  DJANGO_DB_HOST:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: host
  DJANGO_DB_PORT:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: port
  DJANGO_PERFORM_MIGRATIONS: "True"
  DJANGO_CACHE_BACKEND: django_redis.cache.RedisCache
  DJANGO_CACHE_LOCATION:
    value: "redis://{release}-redis.{namespace}.svc.cluster.local:6379/1"
  DJANGO_CACHE_TIMEOUT: "1296000"
  DJANGO_CACHE_CLIENT_CLASS: django_redis.client.DefaultClient
  USE_CELERY: "True"
  CELERY_BROKER:
    value: "redis://{release}-redis.{namespace}.svc.cluster.local:6379/2"
  CELERY_BACKEND:
    value: "redis://{release}-redis.{namespace}.svc.cluster.local:6379/2"
  SYNC_EXERCISES_CELERY: "True"
  SYNC_EXERCISE_IMAGES_CELERY: "True"
  SYNC_EXERCISE_VIDEOS_CELERY: "True"
  SYNC_INGREDIENTS_CELERY: "True"
  DOWNLOAD_INGREDIENTS_FROM: WGER
  WGER_INSTANCE: "https://wger.de"
  WGER_USE_GUNICORN: "True"
  ALLOW_REGISTRATION: "True"
  ALLOW_GUEST_USERS: "True"
  ALLOW_UPLOAD_VIDEOS: "True"
  DJANGO_DEBUG: "False"
  AXES_ENABLED: "True"
  AXES_FAILURE_LIMIT: "10"
  AXES_COOLOFF_TIME: "30"
  AXES_HANDLER: axes.handlers.cache.AxesCacheHandler
  AXES_LOCKOUT_PARAMETERS: ip_address
  AXES_IPWARE_PROXY_COUNT: "1"
  AXES_IPWARE_META_PRECEDENCE_ORDER: HTTP_X_FORWARDED_FOR,REMOTE_ADDR
