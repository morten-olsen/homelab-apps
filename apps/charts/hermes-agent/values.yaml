# Hermes Agent — Nous Research's self-improving AI agent.
# https://hermes-agent.nousresearch.com/docs/
#
# Deploys two workloads sharing one PVC:
#   * dashboard — web UI at hermes.{domain} (private gateway, port 9119).
#   * gateway   — outbound messaging daemon (Telegram/Discord/Slack/etc.),
#                 no inbound port. Configure interactively post-deploy via:
#                 `kubectl exec -it deploy/hermes-agent-gateway -n prod -- hermes gateway setup`
#
# Phase 1: no app-level SSO. Hermes' built-in OAuth only speaks Nous Portal
# (no generic OIDC), so we run with HERMES_DASHBOARD_INSECURE=1 and rely on
# the private-gateway perimeter (LAN/VPN). Phase 2 will add forward-auth.

# Shared image — anchored so dashboard and gateway pin the same digest and
# Renovate updates them together.
image: &image
  repository: nousresearch/hermes-agent
  tag: v2026.5.29.2@sha256:2bba4ab37729ebdd864d4caf277b24fec4cd8bfc2855185fd9f4c90f9bf7bfa3
  pullPolicy: IfNotPresent

dashboard:
  nameOverride: dashboard
  image: *image
  subdomain: hermes

  # DNS is auto-generated by Kyverno from the private-gateway VirtualService.

  deployment:
    strategy: Recreate
    replicas: 1
    revisionHistoryLimit: 0

  # /init (s6-overlay PID 1) is the image's ENTRYPOINT; the wrapper script
  # takes the hermes subcommand as its args. Don't override command — only args.
  args:
    - dashboard
    - --host
    - 0.0.0.0
    - --no-open

  container:
    port: 9119
    healthProbe:
      type: tcpSocket
      port: http
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 4Gi

  service:
    port: 80
    type: ClusterIP

  volumes:
    - name: data
      mountPath: /opt/data
      persistentVolumeClaim: data

  # Single PVC, mounted by both dashboard and gateway. Resolves to
  # `hermes-agent-data` (Release-name prefix). Single-node K3s, so the RWO
  # access mode is fine — both pods schedule on the same node.
  persistentVolumeClaims:
    - name: data
      size: 20Gi
      storageClassName: local-path
      backup: true

  virtualService:
    enabled: true
    gateways:
      public: false
      private: true

  env:
    HERMES_UID: "10000"
    HERMES_GID: "10000"
    # Disable Hermes' built-in Nous-Portal OAuth gate. The dashboard stores
    # API keys, so the private-gateway perimeter is doing the access control
    # for now (see top-of-file phase 1/phase 2 note).
    HERMES_DASHBOARD_INSECURE: "1"

gateway:
  nameOverride: gateway
  image: *image
  # Unused (no VirtualService) but kept to keep env-var placeholder substitution happy.
  subdomain: hermes-gateway

  deployment:
    strategy: Recreate
    replicas: 1
    revisionHistoryLimit: 0

  args:
    - gateway
    - run

  container:
    # Gateway is outbound-only — connects to messaging providers' APIs over
    # the internet, nothing listens. Set a port to satisfy the template; use
    # an exec probe since a TCP probe would fail.
    port: 1
    healthProbe:
      type: exec
      command:
        - /bin/sh
        - -c
        - pgrep -f hermes >/dev/null
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 2Gi

  # No service / virtualService / dns — gateway is outbound-only.

  volumes:
    - name: data
      mountPath: /opt/data
      persistentVolumeClaim: data

  env:
    HERMES_UID: "10000"
    HERMES_GID: "10000"
