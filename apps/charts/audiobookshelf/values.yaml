image:
  repository: ghcr.io/advplyr/audiobookshelf
  tag: 2.33.1@sha256:a4a5841bba093d81e5f4ad1eaedb4da3fda6dbb2528c552349da50ad1f7ae708
  pullPolicy: IfNotPresent

subdomain: audiobookshelf

# Deployment configuration
deployment:
  strategy: Recreate
  replicas: 1

# Container configuration
container:
  port: 80
  healthProbe:
    type: httpGet
    path: /ping

# Service configuration
service:
  port: 80
  type: ClusterIP

# Volume configuration
volumes:
  - name: config
    mountPath: /config
    persistentVolumeClaim: config # Will be prefixed with release name in template
  - name: metadata
    mountPath: /metadata
    persistentVolumeClaim: metadata # Will be prefixed with release name in template
  - name: audiobooks
    mountPath: /audiobooks
    persistentVolumeClaim: books
  - name: podcasts
    mountPath: /podcasts
    persistentVolumeClaim: podcasts

# Persistent volume claims
persistentVolumeClaims:
  - name: config
    size: 1Gi
    storageClassName: local-path
    backup: true
  - name: metadata
    size: 5Gi
    storageClassName: local-path
    backup: true

# DNS configuration
dns:
  enabled: true
  type: A
  dnsClassRef:
    name: private-dns

# OIDC/Authentik configuration
oidc:
  enabled: true
  redirectUris:
    - "/audiobookshelf/auth/openid/callback"
    - "/audiobookshelf/auth/openid/mobile-redirect"

# VirtualService configuration
virtualService:
  enabled: true
  gateways:
    public: true
    private: true
