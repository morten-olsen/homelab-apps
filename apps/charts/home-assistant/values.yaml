image:
  repository: ghcr.io/home-assistant/home-assistant
  tag: 2026.6.3@sha256:aed891b8f801072302815b4b0fab5adb714182967e9d2e2d4a2be558241c73ad
  pullPolicy: IfNotPresent

subdomain: home-assistant

# DNS configuration
dns:
  enabled: true
  type: A
  dnsClassRef:
    name: private-dns

# Deployment configuration
deployment:
  strategy: Recreate
  replicas: 1
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet

# Container configuration
container:
  port: 8123
  healthProbe:
    type: tcpSocket
    port: http # Use named port
  securityContext:
    privileged: true

# Service configuration
service:
  port: 80
  type: ClusterIP

# VirtualService configuration
virtualService:
  enabled: true
  gateways:
    public: true
    private: true

# OIDC client configuration
oidc:
  enabled: true
  redirectUris:
    - "/auth/openid/callback"
  subjectMode: user_username

# Volume configuration
volumes:
  - name: config
    mountPath: /config
    persistentVolumeClaim: config
  - name: misc
    mountPath: /media/misc
    persistentVolumeClaim: misc # External PVC, not prefixed

# Persistent volume claims
persistentVolumeClaims:
  - name: config
    size: 5Gi
    storageClassName: local-path
    backup: true
