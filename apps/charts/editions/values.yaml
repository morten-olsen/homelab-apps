image:
  repository: ghcr.io/morten-olsen/editions
  tag: 0.4.66@sha256:030f837c42104991752e07d323a0b16f40f8a437f09a27376f2e92b9bc698821
  pullPolicy: Always

subdomain: editions

# DNS configuration
dns:
  enabled: true
  type: A
  dnsClassRef:
    name: private-dns

deployment:
  strategy: Recreate
  replicas: 1

container:
  ports:
    - name: http
      port: 3007
      protocol: TCP
  securityContext:
    runAsUser: 1001
    runAsGroup: 1001
# Service configuration
service:
  port: 3007
  type: ClusterIP

initContainers:
  - name: fix-permissions
    image: busybox@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    command: ["sh", "-c", "chown -R 1001:1001 /data"]
    volumeMounts:
      - name: data
        mountPath: /data
    securityContext:
      runAsUser: 0
env:
  EDITIONS_PORT: "3007"

volumes:
  - name: data
    mountPath: /data
    persistentVolumeClaim: data

persistentVolumeClaims:
  - name: data
    size: 10Gi
    storageClassName: local-path
    backup: true

# VirtualService configuration
virtualService:
  enabled: true
  gateways:
    public: false
    private: true
