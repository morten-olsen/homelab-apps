image:
  repository: ghcr.io/sysadminsmedia/homebox
  tag: latest@sha256:17d82459c12a6592b056d9319d3bc8dc46a2a0272062b433cd6ced4aa7155de7
  pullPolicy: IfNotPresent

subdomain: homebox

# DNS configuration
dns:
  enabled: true
  type: A
  dnsClassRef:
    name: private-dns

# Deployment configuration
deployment:
  strategy: RollingUpdate
  replicas: 1

# Container configuration
container:
  port: 7745
  healthProbe:
    type: tcpSocket
    port: http # Use named port

# Service configuration
service:
  port: 80
  type: ClusterIP

# Volume configuration
volumes:
  - name: data
    mountPath: /data
    persistentVolumeClaim: data

# Persistent volume claims
persistentVolumeClaims:
  - name: data
    size: 1Gi
    storageClassName: local-path
    backup: true

# VirtualService configuration
virtualService:
  enabled: true
  gateways:
    public: true
    private: true

# Database configuration
database:
  enabled: true

# Environment variables
env:
  TZ:
    value: "{timezone}"
  HBOX_OPTIONS_ALLOW_REGISTRATION: "false"
  HBOX_DATABASE_DRIVER: postgres
  HBOX_DATABASE_DATABASE:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: database
  HBOX_DATABASE_HOST:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: host
  HBOX_DATABASE_PORT:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: port
  HBOX_DATABASE_SSL_MODE: "disable"
  HBOX_DATABASE_USERNAME:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: user
  HBOX_DATABASE_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: password
