subdomain: wger

image:
  repository: docker.io/wger/server
  tag: latest@sha256:b3dd2bf309443866ed66c84d68c5f3c586feca761932ce3f87fba06c76ff085b
  pullPolicy: IfNotPresent

nginx:
  image:
    repository: docker.io/nginx
    tag: stable-alpine@sha256:94da95f06ada2ac33a9016770c45ad4c3037805ed54ec8dbf2d9d2f83f3f462f
    pullPolicy: IfNotPresent

redis:
  image:
    repository: docker.io/redis
    tag: alpine@sha256:d146f83b1e0f02fc27c26a50cee39338c736674c5959db84363e6ae3cd9e02d2
    pullPolicy: IfNotPresent

# Database provisioning via common library
database:
  enabled: true

# Persistent volume claims
persistentVolumeClaims:
  - name: media
    size: 5Gi
    storageClassName: local-path
    backup: true
  - name: beat-schedule
    size: 100Mi
    storageClassName: local-path
    backup: false

# VirtualService configuration
virtualService:
  enabled: true
  gateways:
    public: false
    private: true
  servicePort: 80

# External secrets for Django secret keys
externalSecrets:
  - name: "{release}-secrets"
    passwords:
      - name: secret-key
        length: 50
        encoding: raw
        allowRepeat: true
        secretKeys:
          - secret-key
      - name: signing-key
        length: 50
        encoding: raw
        allowRepeat: true
        secretKeys:
          - signing-key

env:
  TIME_ZONE:
    value: "{timezone}"
  TZ:
    value: "{timezone}"

  SITE_URL:
    value: "https://{subdomain}.{domain}"

  SECRET_KEY:
    valueFrom:
      secretKeyRef:
        name: "{release}-secrets"
        key: secret-key

  SIGNING_KEY:
    valueFrom:
      secretKeyRef:
        name: "{release}-secrets"
        key: signing-key

  # Database
  DJANGO_DB_ENGINE: "django.db.backends.postgresql"
  DJANGO_DB_DATABASE:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: database
  DJANGO_DB_USER:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: user
  DJANGO_DB_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: password
  DJANGO_DB_HOST:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: host
  DJANGO_DB_PORT:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: port

  # Cache / Celery (using in-cluster Redis)
  DJANGO_CACHE_BACKEND: "django_redis.cache.RedisCache"
  DJANGO_CACHE_LOCATION: "redis://{release}-redis.{namespace}.svc.cluster.local:6379/1"
  DJANGO_CACHE_CLIENT_CLASS: "django_redis.client.DefaultClient"
  CELERY_BROKER: "redis://{release}-redis.{namespace}.svc.cluster.local:6379/2"
  CELERY_BACKEND: "redis://{release}-redis.{namespace}.svc.cluster.local:6379/2"
  USE_CELERY: "True"

  # Application settings
  WGER_PORT: "8000"
  DJANGO_DEBUG: "False"
  WGER_USE_GUNICORN: "True"
  ALLOW_REGISTRATION: "False"
  ALLOW_GUEST_USERS: "False"
  DJANGO_PERFORM_MIGRATIONS: "True"
  NUMBER_OF_PROXIES: "1"
  AXES_ENABLED: "True"
  AXES_FAILURE_LIMIT: "10"
  AXES_COOLOFF_TIME: "30"
  AXES_HANDLER: "axes.handlers.cache.AxesCacheHandler"
  AXES_LOCKOUT_PARAMETERS: "ip_address"
  AXES_IPWARE_PROXY_COUNT: "1"
  AXES_IPWARE_META_PRECEDENCE_ORDER: "HTTP_X_FORWARDED_FOR,REMOTE_ADDR"
  X_FORWARDED_PROTO_HEADER_SET: "True"
