image:
  repository: louislam/uptime-kuma
  tag: 2@sha256:91e963bfda569ba115206e843febb446f473ab525add4e08b2b9e3beffa16985
  pullPolicy: IfNotPresent

subdomain: uptime-kuma

deployment:
  strategy: Recreate
  replicas: 1
  revisionHistoryLimit: 0

container:
  port: 3001
  healthProbe:
    type: tcpSocket

service:
  port: 80

volumes:
  - name: data
    mountPath: /app/data
    persistentVolumeClaim: data

persistentVolumeClaims:
  - name: data
    size: 1Gi
    storageClassName: local-path
    backup: true

virtualService:
  enabled: true
  gateways:
    public: false
    private: true
