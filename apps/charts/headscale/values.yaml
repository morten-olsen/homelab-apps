image:
  repository: docker.io/headscale/headscale
  tag: 0.25.1
  pullPolicy: IfNotPresent

subdomain: headscale

initContainers:
  - name: inject-secrets
    image: "docker.io/headscale/headscale:0.25.1"
    imagePullPolicy: IfNotPresent
    command: ["sh", "-c"]
    args:
      - |
        cp /etc/headscale-template/config.yaml /etc/headscale/config.yaml
        sed -i "s|host: TO_BE_REPLACED_BY_INIT|host: ${DB_HOST}|" /etc/headscale/config.yaml
        sed -i "s|name: TO_BE_REPLACED_BY_INIT|name: ${DB_NAME}|" /etc/headscale/config.yaml
        sed -i "s|user: TO_BE_REPLACED_BY_INIT|user: ${DB_USER}|" /etc/headscale/config.yaml
        sed -i "s|pass: TO_BE_REPLACED_BY_INIT|pass: ${DB_PASS}|" /etc/headscale/config.yaml
        sed -i "s|issuer: TO_BE_REPLACED_BY_INIT|issuer: ${OIDC_ISSUER}|" /etc/headscale/config.yaml
        sed -i "s|client_id: TO_BE_REPLACED_BY_INIT|client_id: ${OIDC_CLIENT_ID}|" /etc/headscale/config.yaml
        sed -i "s|client_secret: TO_BE_REPLACED_BY_INIT|client_secret: ${OIDC_CLIENT_SECRET}|" /etc/headscale/config.yaml

    env:
      - name: DB_HOST
        valueFrom:
          secretKeyRef:
            name: "{release}-connection"
            key: host
      - name: DB_NAME
        valueFrom:
          secretKeyRef:
            name: "{release}-connection"
            key: database
      - name: DB_USER
        valueFrom:
          secretKeyRef:
            name: "{release}-connection"
            key: user
      - name: DB_PASS
        valueFrom:
          secretKeyRef:
            name: "{release}-connection"
            key: password
      - name: OIDC_ISSUER
        valueFrom:
          secretKeyRef:
            name: "{release}-oidc-credentials"
            key: issuer
      - name: OIDC_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: "{release}-oidc-credentials"
            key: clientId
      - name: OIDC_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: "{release}-oidc-credentials"
            key: clientSecret
    volumeMounts:
      - mountPath: /etc/headscale-template
        name: config-template
      - mountPath: /etc/headscale
        name: config-writable

args:
  - serve

deployment:
  strategy: Recreate
  replicas: 1
  revisionHistoryLimit: 0

container:
  port: 8080
  healthProbe:
    type: httpGet
    path: /health
    port: 8080
  resources:
    limits:
      memory: "256Mi"
      cpu: "500m"

service:
  port: 80

dns:
  enabled: true
  type: A
  dnsClassRef:
    name: private-dns

volumes:
  - name: config-template
    configMap: headscale-config
  - name: config-writable
    mountPath: /etc/headscale
    emptyDir: true
  - name: run
    mountPath: /var/run/headscale
    emptyDir: true
  - name: data
    mountPath: /var/lib/headscale
    persistentVolumeClaim: data

persistentVolumeClaims:
  - name: data
    size: 1Gi
    storageClassName: local-path
    backup: true

virtualService:
  enabled: true
  gateways:
    public: true
    private: true

oidc:
  enabled: true
  redirectUris:
    - "/oidc/callback"
  subjectMode: user_email

database:
  enabled: true


# Headscale config.yaml values (used by the ConfigMap template)
headscale:
  # DERP (relay) - use Tailscale's public DERP servers
  derp:
    urls:
      - https://controlplane.tailscale.com/derpmap/default
  # DNS pushed to clients
  dns:
    baseDomain: vpn.olsen.cloud
    magicDns: true
    nameservers:
      global:
        - 192.168.20.180   # Pi-hole on the cluster
  # Prefixes for VPN clients
  prefixes:
    v4: 100.64.0.0/10
    v6: fd7a:115c:a1e0::/48
