apiVersion: batch/v1
kind: Job
metadata:
  name: headscale-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: headscale-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: docker.io/bitnami/kubectl:latest
          command: ["sh", "-c"]
          args:
            - |
              set -e

              # Wait for headscale to be ready
              echo "Waiting for headscale..."
              until kubectl rollout status deploy/headscale -n {{ .Release.Namespace }} --timeout=5s 2>/dev/null; do
                sleep 5
              done
              # Give it a moment to finish startup
              sleep 5

              # Check if the router secret already exists
              if kubectl get secret headscale-router-auth -n {{ .Release.Namespace }} 2>/dev/null; then
                echo "Router auth secret already exists, skipping"
                exit 0
              fi

              # Create the router user (ignore error if exists)
              kubectl exec deploy/headscale -c headscale -n {{ .Release.Namespace }} -- \
                headscale users create router 2>/dev/null || true

              # Create a pre-auth key for the router
              KEY=$(kubectl exec deploy/headscale -c headscale -n {{ .Release.Namespace }} -- \
                headscale preauthkeys create --user router --reusable --expiration 87600h -o json \
                | grep -o '"key":"[^"]*"' | head -1 | cut -d'"' -f4)

              if [ -z "$KEY" ]; then
                echo "Failed to create pre-auth key"
                exit 1
              fi

              # Store it as a Kubernetes secret for the router pod
              kubectl create secret generic headscale-router-auth \
                -n {{ .Release.Namespace }} \
                --from-literal=authkey="$KEY"

              echo "Router auth secret created"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headscale-bootstrap
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: headscale-bootstrap
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: headscale-bootstrap
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: headscale-bootstrap
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: headscale-bootstrap
