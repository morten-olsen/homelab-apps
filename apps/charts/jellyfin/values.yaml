image:
  repository: docker.io/jellyfin/jellyfin
  tag: latest@sha256:f66273e014b307e4ac46778845ebc1e9ee24b2e57c1fc17d5ec5ac3015649bfa
  pullPolicy: IfNotPresent

subdomain: jellyfin

# DNS configuration
dns:
  enabled: true
  type: A
  dnsClassRef:
    name: private-dns

# Deployment configuration
deployment:
  strategy: Recreate
  replicas: 1

# Container configuration
container:
  port: 8096
  healthProbe:
    type: tcpSocket
    port: http # Use named port

# Service configuration
service:
  port: 80
  targetPort: 8096
  type: ClusterIP

# OIDC client
oidc:
  enabled: true
  redirectUris:
    - "/sso/OID/redirect/Authentik"

# Volume configuration
volumes:
  - name: config
    mountPath: /config
    persistentVolumeClaim: config
  - name: movies
    mountPath: /media/movies
    persistentVolumeClaim: movies # External PVC (not prefixed)
  - name: tvshows
    mountPath: /media/tv-shows
    persistentVolumeClaim: tvshows # External PVC (not prefixed)
  - name: music
    mountPath: /media/music
    persistentVolumeClaim: music # External PVC (not prefixed)

# Persistent volume claims
persistentVolumeClaims:
  - name: config
    size: 5Gi
    storageClassName: local-path
    backup: true

# VirtualService configuration
virtualService:
  enabled: true
  gateways:
    public: true
    private: true
