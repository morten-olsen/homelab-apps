image:
  repository: vaultwarden/server
  tag: 1.35.8@sha256:c4f6056fe0c288a052a223cecd263a90d1dda1a0177bb5b054a363a6c7b211d9
  pullPolicy: IfNotPresent

subdomain: vaultwarden

# DNS configuration
dns:
  enabled: true
  type: A
  dnsClassRef:
    name: private-dns

deployment:
  strategy: Recreate
  replicas: 1
  revisionHistoryLimit: 0

container:
  port: 80
  healthProbe:
    type: tcpSocket

service:
  port: 80

volumes:
  - name: data
    mountPath: /data
    persistentVolumeClaim: data

persistentVolumeClaims:
  - name: data
    size: 3Gi
    storageClassName: local-path
    backup: true

virtualService:
  enabled: true
  gateways:
    public: true
    private: true

env:
  DOMAIN:
    value: "https://{subdomain}.{domain}"

