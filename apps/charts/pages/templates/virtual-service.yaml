{{- $fullname := include "common.fullname" . -}}
{{- $publicDomain := .Values.pages.publicDomain -}}
{{- $adminHost := printf "%s.%s" .Values.subdomain .Values.globals.domain -}}
---
# Public listener: serves static content. Routes user-facing traffic on both
# gateways so end users (public) and internal pi-hole resolution (private,
# mesh) reach the same Service.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ $fullname }}-public
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  gateways:
    - shared/public
    - shared/private
    - mesh
  hosts:
    - {{ $publicDomain | quote }}
    - {{ printf "*.%s" $publicDomain | quote }}
  http:
    - route:
        - destination:
            host: {{ $fullname }}
            port:
              number: 80
---
# Admin listener: bearer-token-gated upload API. Private gateway + mesh only,
# never exposed publicly. CI runners hit https://pages-admin.{domain} and the
# Kyverno-generated ServiceEntry hairpins through the gateway in-cluster.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ $fullname }}-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  gateways:
    - shared/private
    - mesh
  hosts:
    - {{ $adminHost | quote }}
  http:
    - route:
        - destination:
            host: {{ $fullname }}-admin
            port:
              number: 9090
