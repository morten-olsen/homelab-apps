apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
data:
  config.toml: |
    log-format = "text"

    [server]
    pages = "tcp/0.0.0.0:3000"
    caddy = "-"
    metrics = "tcp/0.0.0.0:3002"

    [storage]
    type = "fs"

    [storage.fs]
    root = "/app/data"

    # Wildcard: any subdomain of mortenolsen.pro maps to the Forgejo repo
    # at {{ .Values.pages.forgeUser }}/<subdomain>. Forge authorization
    # delegates write permission checks back to Forgejo.
    [[wildcard]]
    domain = {{ .Values.pages.domain | quote }}
    clone-url = "{{ .Values.pages.forgeUrl }}/{{ .Values.pages.forgeUser }}/<user>.git"
    authorization = "forgejo"

    [limits]
    max-site-size = "256MB"
    max-manifest-size = "1MB"
    allow-basic-auth = false
