image:
  repository: code.olsen.cloud/homelab/pages
  tag: latest
  pullPolicy: IfNotPresent

# subdomain is used for the admin VS hostname (pages-admin.{globals.domain}).
# The public-facing site lives on an external domain — see pages.publicDomain.
subdomain: pages-admin

deployment:
  strategy: Recreate
  replicas: 1
  revisionHistoryLimit: 2

# The image is FROM scratch and runs as UID/GID 65532. local-path provisions
# the PV root as root with 0777, so an init container chowns it to 65532
# before the main container starts.
initContainers:
  - name: chown-data
    image: busybox:1.37
    command: ["sh", "-c", "chown -R 65532:65532 /data"]
    volumeMounts:
      - name: data
        mountPath: /data
    securityContext:
      runAsUser: 0

container:
  ports:
    - name: public
      port: 8080
      protocol: TCP
    - name: admin
      port: 9090
      protocol: TCP
  healthProbe:
    type: tcpSocket
    port: public
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      memory: 128Mi

service:
  ports:
    - name: public
      port: 80
      targetPort: 8080
      protocol: TCP
      type: ClusterIP
    - name: admin
      port: 9090
      targetPort: 9090
      protocol: TCP
      serviceName: admin
      type: ClusterIP

volumes:
  - name: data
    mountPath: /data
    persistentVolumeClaim: data

persistentVolumeClaims:
  - name: data
    size: 10Gi
    storageClassName: local-path
    backup: true

# Disable common.virtualService — we hand-roll public + admin VSes below
# (templates/virtual-service.yaml).
virtualService:
  enabled: false

env:
  PAGES_DATA_DIR: /data
  PAGES_PUBLIC_ADDR: ":8080"
  PAGES_ADMIN_ADDR: ":9090"
  PAGES_KEEP_RELEASES: "5"
  PAGES_ADMIN_TOKEN:
    valueFrom:
      secretKeyRef:
        name: "{release}-secrets"
        key: admin-token

externalSecrets:
  - name: "{release}-secrets"
    passwords:
      - name: admin-token
        length: 48
        encoding: hex
        allowRepeat: true
        secretKeys:
          - admin-token

# Public-facing domain. Must be covered by additionalDomains in core/homelab
# values (wildcard cert) and by DNS (pi-hole internally; Cloudflare publicly
# once those records exist).
pages:
  publicDomain: mortenolsen.pro
