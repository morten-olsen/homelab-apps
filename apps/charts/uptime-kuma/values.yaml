image:
  repository: louislam/uptime-kuma
  tag: 2@sha256:7337368a77873f159435de9ef09567f68c31285ed5f951dec36256c4b267ee44
  pullPolicy: IfNotPresent

subdomain: uptime-kuma

deployment:
  strategy: Recreate
  replicas: 1
  revisionHistoryLimit: 0

container:
  port: 3001
  healthProbe:
    type: tcpSocket

service:
  port: 80

volumes:
  - name: data
    mountPath: /app/data
    persistentVolumeClaim: data

persistentVolumeClaims:
  - name: data
    size: 1Gi
    storageClassName: local-path
    backup: true

virtualService:
  enabled: true
  gateways:
    public: false
    private: true
