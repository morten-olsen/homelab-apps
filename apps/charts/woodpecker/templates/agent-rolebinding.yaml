apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "{{ .Release.Name }}-agent"
  namespace: "{{ .Values.agent.pipelineNamespace }}"
subjects:
  - kind: ServiceAccount
    name: "{{ .Release.Name }}-agent"
    namespace: "{{ .Release.Namespace }}"
roleRef:
  kind: Role
  name: "{{ .Release.Name }}-agent"
  apiGroup: rbac.authorization.k8s.io
