image:
  repository: ghcr.io/gitroomhq/postiz-app
  tag: latest
  pullPolicy: IfNotPresent

redis:
  image:
    repository: redis
    tag: 7.2-alpine
    pullPolicy: IfNotPresent

subdomain: postiz

deployment:
  strategy: Recreate
  replicas: 1

container:
  port: 5000
  healthProbe:
    type: httpGet
    path: /
    port: http
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 10
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      memory: 4Gi

service:
  port: 80
  type: ClusterIP

volumes:
  - name: config
    mountPath: /config
    persistentVolumeClaim: config
  - name: uploads
    mountPath: /uploads
    persistentVolumeClaim: data

# common.volumes only auto-prefixes PVC refs named "config", "metadata",
# or "data" with the release name — so the uploads volume binds to a PVC
# named "data".
persistentVolumeClaims:
  - name: config
    size: 1Gi
    storageClassName: local-path
    backup: true
  - name: data
    size: 10Gi
    storageClassName: local-path
    backup: true
  - name: redis-data
    size: 1Gi
    storageClassName: local-path
    backup: false

virtualService:
  enabled: true
  gateways:
    private: true

database:
  enabled: true

externalSecrets:
  - name: "{release}-secrets"
    passwords:
      - name: jwt-secret
        length: 64
        allowRepeat: true
        encoding: hex
        secretKeys:
          - jwt-secret

env:
  IS_GENERAL: "true"
  RUN_CRON: "true"
  DISABLE_REGISTRATION: "false"

  # URLs — Postiz expects no trailing slash on MAIN_URL/FRONTEND_URL.
  MAIN_URL:
    value: "https://{subdomain}.{domain}"
  FRONTEND_URL:
    value: "https://{subdomain}.{domain}"
  NEXT_PUBLIC_BACKEND_URL:
    value: "https://{subdomain}.{domain}/api"
  BACKEND_INTERNAL_URL: "http://localhost:3000"

  # Storage
  STORAGE_PROVIDER: local
  UPLOAD_DIRECTORY: /uploads
  NEXT_PUBLIC_UPLOAD_DIRECTORY: /uploads

  # Database — common.database provisions {release}-connection with `url`.
  DATABASE_URL:
    valueFrom:
      secretKeyRef:
        name: "{release}-connection"
        key: url

  # Redis (sidecar)
  REDIS_URL:
    value: "redis://{release}-redis:6379"

  # Temporal (shared service)
  TEMPORAL_ADDRESS: "temporal.shared.svc.cluster.local:7233"

  # Secrets
  JWT_SECRET:
    valueFrom:
      secretKeyRef:
        name: "{release}-secrets"
        key: jwt-secret

  # Social platform credentials (each from its own SealedSecret)
  LINKEDIN_CLIENT_ID:
    valueFrom:
      secretKeyRef:
        name: "{release}-linkedin"
        key: client-id
  LINKEDIN_CLIENT_SECRET:
    valueFrom:
      secretKeyRef:
        name: "{release}-linkedin"
        key: client-secret
