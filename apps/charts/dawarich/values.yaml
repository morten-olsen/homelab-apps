# Dawarich is a Rails app + Sidekiq worker backed by Postgres (with PostGIS)
# and Redis, with an in-cluster Photon for reverse-geocoding.
# This chart is custom (not common.all) because it ships three deployments;
# common.* is still used for PVCs, OIDC, VirtualService, the database, and
# secrets so the wiring matches every other app.

subdomain: dawarich

# Web + worker share the same image (different entrypoints).
app:
  image:
    repository: freikin/dawarich
    # Renovate will pin the SHA on first run.
    tag: latest@sha256:dceef4bf7bd5e6a842d61cdd2a82440a0db34f70dc766e02b0b3b212e13b4ba6
    pullPolicy: IfNotPresent

redis:
  image:
    repository: redis
    tag: 7.4-alpine@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6
    pullPolicy: IfNotPresent

# Photon does in-cluster reverse-geocoding so we don't ping the public API
# for every point. The data dir is regenerable from the upstream OSM dump,
# so the PVC is intentionally not backed up.
photon:
  image:
    repository: ghcr.io/rtuszik/photon-docker
    tag: latest@sha256:9e0f006e6eb5854fa43c71fb491203ee87905315e265c184e9afcc57c7555367
    pullPolicy: IfNotPresent
  # europe (~60GB) covers our use case; switch to `planet` (~90GB) for
  # full coverage or a smaller country code (e.g. `dk`) to shrink the PVC.
  region: europe

# Private DNS A record so internal clients don't hairpin through the public
# gateway.
dns:
  enabled: true
  type: A
  dnsClassRef:
    name: private-dns

# Main service — what virtualService routes to. Selector matches the web
# Deployment via app=dawarich-app.
service:
  port: 80
  type: ClusterIP

virtualService:
  enabled: true
  gateways:
    public: true
    private: true

# Authentik provisions {release}-oidc-credentials with clientId, clientSecret
# and issuer; Dawarich supports env-driven OIDC discovery natively.
oidc:
  enabled: true
  redirectUris:
    - "/users/auth/openid_connect/callback"

# Database — CNPG provisions a Postgres DB on the shared cluster; secret
# {release}-connection exposes host/port/database/user/password. The shared
# cluster runs the CNPG postgis variant so the postgis binaries are
# available, but `CREATE EXTENSION postgis` still requires superuser
# (postgis isn't a trusted extension and the per-app DB owner isn't a
# superuser). The cluster's controller secret lives in `shared` and isn't
# reflected here, so on first deploy run the bootstrap once manually:
#
#   kubectl exec -n shared postgres-cluster-1 -c postgres -- psql -d prod_dawarich \
#     -c "CREATE EXTENSION IF NOT EXISTS postgis;" \
#     -c "CREATE EXTENSION IF NOT EXISTS postgis_topology;"
database:
  enabled: true

# Generated secrets:
# - secretKeyBase: Rails SECRET_KEY_BASE (64-byte hex)
externalSecrets:
  - name: "{release}-secrets"
    passwords:
      - name: secret-key-base
        length: 64
        encoding: hex
        allowRepeat: true
        secretKeys:
          - secretKeyBase

persistentVolumeClaims:
  - name: storage
    size: 20Gi
    storageClassName: local-path
    backup: true
  - name: public
    size: 1Gi
    storageClassName: local-path
    backup: false
  - name: watched
    size: 5Gi
    storageClassName: local-path
    backup: false
  - name: photon-data
    size: 70Gi
    storageClassName: local-path
    backup: false
