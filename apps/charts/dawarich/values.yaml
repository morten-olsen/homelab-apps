# Dawarich is a Rails app + Sidekiq worker backed by PostGIS-flavored
# Postgres and Redis, with an in-cluster Photon for reverse-geocoding.
# This chart is custom (not common.all) because it ships five deployments;
# common.* is still used for PVCs, OIDC, VirtualService, secrets, and
# backups so the wiring matches every other app.

subdomain: dawarich

# Web + worker share the same image (different entrypoints).
app:
  image:
    repository: freikin/dawarich
    # Renovate will pin the SHA on first run.
    tag: latest@sha256:dea326d03e728cd3b8d051b72d293cf375d0db6c00e22c55f338daedfdfdb3a4
    pullPolicy: IfNotPresent

# Self-contained PostGIS rather than the shared CNPG cluster — Dawarich
# requires the postgis extension and PG18 doesn't have a monolithic
# postgis image (the old cloudnative-pg/postgis repo only publishes up
# to PG15; PG18 uses ImageVolume + postgis-extension which the platform
# PostgresDatabase CRD doesn't surface). Data PVC is backed up via VolSync.
db:
  image:
    repository: postgis/postgis
    tag: 17-3.5-alpine@sha256:5dc2f0b5871ba999a2825d3b118e4d70a7e61577ab5fca2d8695632007214acb
    pullPolicy: IfNotPresent

redis:
  image:
    repository: redis
    tag: 8.6-alpine@sha256:d146f83b1e0f02fc27c26a50cee39338c736674c5959db84363e6ae3cd9e02d2
    pullPolicy: IfNotPresent

# Photon does in-cluster reverse-geocoding so we don't ping the public API
# for every point. The data dir is regenerable from the upstream OSM dump,
# so the PVC is intentionally not backed up.
photon:
  image:
    repository: ghcr.io/rtuszik/photon-docker
    tag: latest@sha256:9e0f006e6eb5854fa43c71fb491203ee87905315e265c184e9afcc57c7555367
    pullPolicy: IfNotPresent
  # europe (~60GB) covers our use case; switch to `planet` (~90GB) for
  # full coverage or a smaller country code (e.g. `dk`) to shrink the PVC.
  region: europe

# Private DNS A record so internal clients don't hairpin through the public
# gateway.
dns:
  enabled: true
  type: A
  dnsClassRef:
    name: private-dns

# Main service — what virtualService routes to. Selector matches the web
# Deployment via app=dawarich-app.
service:
  port: 80
  type: ClusterIP

virtualService:
  enabled: true
  gateways:
    public: true
    private: true

# Authentik provisions {release}-oidc-credentials with clientId, clientSecret
# and issuer; Dawarich supports env-driven OIDC discovery natively.
oidc:
  enabled: true
  redirectUris:
    - "/users/auth/openid_connect/callback"

# Generated secrets:
# - secretKeyBase: Rails SECRET_KEY_BASE (64-byte hex)
# - dbPassword: Postgres user password, shared between app/sidekiq/db pods
externalSecrets:
  - name: "{release}-secrets"
    passwords:
      - name: secret-key-base
        length: 64
        encoding: hex
        allowRepeat: true
        secretKeys:
          - secretKeyBase
      - name: db-password
        length: 32
        allowRepeat: true
        secretKeys:
          - dbPassword

persistentVolumeClaims:
  - name: db-data
    size: 10Gi
    storageClassName: local-path
    backup: true
  - name: storage
    size: 20Gi
    storageClassName: local-path
    backup: true
  - name: public
    size: 1Gi
    storageClassName: local-path
    backup: false
  - name: watched
    size: 5Gi
    storageClassName: local-path
    backup: false
  - name: photon-data
    size: 70Gi
    storageClassName: local-path
    backup: false
