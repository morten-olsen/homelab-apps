repoURL: "https://github.com/morten-olsen/homelab-apps"
targetRevision: "main"
path: "apps/charts"
exclude: "*.disabled"
project: "apps"
globals:
  environment: prod
  domain: olsen.cloud
  timezone: Europe/Amsterdam
  database:
    ref:
      name: postgres
      namespace: shared
  istio:
    gateway: shared/private
    gateways:
      private: shared/private
      public: shared/public
  authentik:
    ref:
      name: authentik
      namespace: shared
  backup:
    enabled: true
    nfs:
      server: 192.168.20.106
      path: /mnt/HDD/k8s/backups
    retain:
      daily: 7
      weekly: 4
      monthly: 3
